version: "3.8"

services:
  app:
    build: .
    container_name: viandas-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/viandas_zarate
    ports:
      - "4000:4000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: viandas-mongo
    restart: unless-stopped
    volumes:
      - viandas_mongo:/data/db
    ports:
      - "127.0.0.1:27017:27017"

volumes:
  viandas_mongo:
